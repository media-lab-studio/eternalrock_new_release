<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="description"
        content="EternalRock — Ваша рок-станция 24/7. Классический рок, метал, альтернатива и не только." />
    <title>EternalRock • Rock Radio 24/7</title>

    <link rel="icon" type="image/png" href="img/favicon-eternal-rock.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <!-- Фоновые эффекты -->
    <div class="bg-effects">
        <div class="bg-gradient"></div>
        <div class="bg-particles" id="particles"></div>
        <div class="bg-vignette"></div>
    </div>

    <!-- Основной контейнер (фиксированная высота 100vh) -->
    <main class="app-container">

        <!-- HEADER -->
        <header class="app-header">
            <div class="header-brand">
                <h1 class="brand-title">
                    <span class="brand-glow">Eternal</span>Rock
                    <span class="brand-underline"></span>
                </h1>
                <p class="brand-tagline">Ваша рок-станция <span class="highlight">24/7</span></p>
            </div>

            <a href="apk/EternalRock.apk" download class="btn-download">
                <i class="fab fa-android"></i>
                <span>Скачать приложение</span>
            </a>
        </header>

        <!-- MAIN CONTENT GRID -->
        <section class="content-grid">

            <!-- Слайдер -->
            <div class="slider-section">
                <div class="slider-wrapper" id="slider">
                    <div class="slides-track" id="slidesTrack"></div>

                    <!-- Контролы слайдера -->
                    <button class="slider-btn prev" aria-label="Предыдущий слайд">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="slider-btn next" aria-label="Следующий слайд">
                        <i class="fas fa-chevron-right"></i>
                    </button>

                    <!-- Индикаторы -->
                    <div class="slider-indicators" id="sliderIndicators"></div>

                    <!-- Кнопка полноэкранного режима -->
                    <button class="slider-fullscreen" id="fullscreenBtn" aria-label="Полноэкранный режим">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>

            <!-- Расписание -->
            <aside class="schedule-section">
                <div class="schedule-header">
                    <h2><i class="fas fa-calendar-week"></i> Расписание эфира</h2>
                    <time class="current-time" id="currentTime" datetime="">--:--</time>
                </div>
                <div class="schedule-scroll">
                    <ul class="schedule-list" id="scheduleList">
                        <!-- Генерируется через JS -->
                    </ul>
                </div>
            </aside>

        </section>

        <!-- PLAYER PANEL -->
        <footer class="player-panel">
            <div class="player-left">
                <!-- Вращающаяся пластинка -->
                <button class="vinyl-btn" id="playBtn" aria-label="Воспроизвести/Пауза">
                    <div class="vinyl-disc">
                        <div class="vinyl-label">
                            <img src="img/skull-icon.png" alt="🎸" class="vinyl-icon" />
                        </div>
                        <div class="vinyl-grooves"></div>
                    </div>
                    <div class="play-overlay">
                        <i class="fas fa-play play-icon"></i>
                        <i class="fas fa-pause pause-icon"></i>
                    </div>
                </button>
            </div>

            <div class="player-center">
                <div class="track-info">
                    <div class="track-now">
                        <span class="track-label"><i class="fas fa-fire"></i> Сейчас в эфире:</span>
                        <div class="marquee">
                            <span class="marquee-text" id="currentTrack">Загрузка...</span>
                        </div>
                    </div>
                    <div class="track-next">
                        <span class="track-label"><i class="fas fa-forward"></i> Далее:</span>
                        <span class="track-name" id="nextTrack">—</span>
                    </div>
                </div>
            </div>

            <div class="player-right">
                <div class="volume-control">
                    <button class="volume-btn" id="muteBtn" aria-label="Выключить звук">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" />
                    <span class="volume-value" id="volumeValue">70%</span>
                </div>
                <div class="playlist-badge">
                    <i class="fas fa-music"></i>
                    <span id="playlistName">Classic Rock</span>
                </div>
            </div>
        </footer>

           <!-- SOCIAL BUTTONS -->
    <div class="social-bar">
      <a href="https://t.me/+IKyfzhp_0MQ3NjAy" target="_blank" rel="noopener" class="social-btn telegram">
        <i class="fab fa-telegram-plane"></i> Telegram
      </a>
      <a href="https://www.donationalerts.com/r/eternalrock" target="_blank" rel="noopener"
        class="social-btn donate">
        <i class="fas fa-heart"></i> Поддержать
      </a>
    </div>

  </main>

  <!-- Скрытый аудио-элемент -->
  <audio id="audioStream" preload="none" crossorigin="anonymous"></audio>

  <!-- 🔥 jQuery (ОБЯЗАТЕЛЬНО для myradio24 плеера) -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"
    integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" 
    crossorigin="anonymous"></script>

  <!-- Скрипт плеера myradio24 -->
  <script src="https://myradio24.com/player/player.js?v3.31" 
    data-radio="25968" 
    data-interval="15" 
    data-vmid="25968"
    data-lang="ru" 
    async></script>

  <!-- ✅ НАШИ СКРИПТЫ - ВЫБЕРИТЕ ОДИН ВАРИАНТ -->
  
  <!-- Вариант А: Модульная версия (для http://localhost) -->
  <!-- <script type="module" src="js/app.js"></script> -->
  
  <!-- Вариант Б: Универсальная версия (для file://) -->
  <script src="js/app.js"></script>

</body>
</html>
